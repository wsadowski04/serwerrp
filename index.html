<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Hamburg - Portal RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #313338; color: #DBDEE1; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Pasek boczny i główny kontener -->
    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <nav class="w-[72px] bg-[#1E1F22] flex flex-col items-center py-3 space-y-4 shrink-0">
            <div class="w-12 h-12 bg-[#5865F2] rounded-[16px] flex items-center justify-center text-white cursor-pointer">
                <i data-lucide="message-square"></i>
            </div>
            <div id="admin-icon" class="hidden w-12 h-12 bg-[#ED4245] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all">
                <i data-lucide="shield-alert"></i>
            </div>
        </nav>

        <!-- Główna zawartość -->
        <main class="flex-1 flex flex-col">
            <header class="h-12 border-b border-[#1F2124] flex items-center px-4 justify-between bg-[#313338]">
                <div class="flex items-center font-bold text-white">
                    <i data-lucide="hash" class="text-[#80848E] mr-2"></i> ogólny
                </div>
                <button id="login-btn" class="bg-[#248046] hover:bg-[#1a6334] text-white px-3 py-1 rounded text-sm font-medium transition-colors">
                    Zaloguj jako Admin
                </button>
            </header>

            <!-- Czat -->
            <div class="flex-1 p-4 overflow-y-auto space-y-4" id="chat-box">
                <div class="flex gap-3">
                    <div class="w-10 h-10 bg-gray-500 rounded-full flex items-center justify-center font-bold text-white">S</div>
                    <div>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-white text-sm">System</span>
                            <span class="text-[10px] text-[#949BA4]">Dzisiaj o 12:00</span>
                        </div>
                        <p class="text-sm">Witaj na portalu Emergency Hamburg! Aby zarządzać stroną, kliknij przycisk logowania.</p>
                    </div>
                </div>
            </div>

            <!-- Panel Admina (Ukryty) -->
            <div id="admin-panel" class="hidden fixed inset-0 bg-[#313338] z-50 p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between items-center mb-8">
                        <h1 class="text-2xl font-bold text-white flex items-center gap-2">
                            <i data-lucide="shield-check" class="text-[#ED4245]"></i> Panel Administracyjny
                        </h1>
                        <button id="close-admin" class="text-[#949BA4] hover:text-white"><i data-lucide="x"></i></button>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-[#2B2D31] p-6 rounded-lg border border-[#3F4147]">
                            <h3 class="font-bold mb-2">Zarządzanie czatem</h3>
                            <button class="w-full bg-[#ED4245] py-2 rounded font-bold text-sm">Wyczyść wiadomości</button>
                        </div>
                        <div class="bg-[#2B2D31] p-6 rounded-lg border border-[#3F4147]">
                            <h3 class="font-bold mb-2">Serwery</h3>
                            <button class="w-full bg-[#5865F2] py-2 rounded font-bold text-sm">Dodaj nowy serwer</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // LOGIKA DOSTĘPU
        const ADMIN_CODE = "EH2026"; // TWOJE HASŁO DO PANELU

        const loginBtn = document.getElementById('login-btn');
        const adminIcon = document.getElementById('admin-icon');
        const adminPanel = document.getElementById('admin-panel');
        const closeAdmin = document.getElementById('close-admin');

        loginBtn.onclick = () => {
            const pass = prompt("Podaj kod administratora:");
            if (pass === ADMIN_CODE) {
                alert("Zalogowano pomyślnie!");
                adminIcon.classList.remove('hidden');
                loginBtn.innerText = "Zalogowano: Admin";
                loginBtn.classList.replace('bg-[#248046]', 'bg-[#5865F2]');
            } else {
                alert("Błędny kod!");
            }
        };

        adminIcon.onclick = () => adminPanel.classList.remove('hidden');
        closeAdmin.onclick = () => adminPanel.classList.add('hidden');

        lucide.createIcons();
    </script>
</body>
</html>
