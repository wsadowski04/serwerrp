<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergency Hamburg - Portal RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #313338; color: #DBDEE1; }
        .msg { animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- Modal Nicku -->
    <div id="nick-modal" class="fixed inset-0 bg-black/90 z-[500] flex items-center justify-center p-4">
        <div class="bg-[#313338] p-8 rounded-xl border border-[#3F4147] max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-4 text-center">PODAJ NICK (Roblox/DC)</h2>
            <input type="text" id="user-nick-input" class="w-full bg-[#1E1F22] border-none rounded p-3 text-white mb-4 outline-none ring-2 ring-[#5865F2]" placeholder="Twój nick...">
            <button onclick="saveNick()" class="w-full bg-[#5865F2] hover:bg-[#4752C4] text-white py-3 rounded font-bold transition-all text-lg">WEJDŹ NA PORTAL</button>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar -->
        <nav class="w-[72px] bg-[#1E1F22] flex flex-col items-center py-3 space-y-4 shrink-0">
            <div onclick="showTab('chat')" class="w-12 h-12 bg-[#5865F2] rounded-[16px] flex items-center justify-center text-white cursor-pointer hover:rounded-[12px] transition-all"><i data-lucide="message-square"></i></div>
            <div onclick="showTab('apply')" class="w-12 h-12 bg-[#3BA55C] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all"><i data-lucide="plus-circle"></i></div>
            <div id="admin-icon" class="hidden w-12 h-12 bg-[#ED4245] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all"><i data-lucide="shield-alert"></i></div>
        </nav>

        <!-- Sidebar Kanały -->
        <aside id="sidebar" class="w-60 bg-[#2B2D31] flex flex-col hidden md:flex">
            <div class="h-12 border-b border-[#1F2124] flex items-center px-4 font-bold text-white uppercase text-sm">Kanały EH</div>
            <div class="p-2 space-y-1">
                <button onclick="changeChannel('ogolny')" class="w-full flex items-center px-2 py-2 rounded bg-[#3F4147] text-white text-sm"><i data-lucide="hash" class="w-4 h-4 mr-2"></i> ogólny</button>
                <button onclick="changeChannel('szukam-ekipy')" class="w-full flex items-center px-2 py-2 rounded text-[#949BA4] hover:bg-[#35373C] text-sm"><i data-lucide="hash" class="w-4 h-4 mr-2"></i> szukam-ekipy</button>
            </div>
            <div class="mt-auto bg-[#232428] p-3 flex items-center gap-2">
                <div id="u-avatar" class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center font-bold text-white">?</div>
                <div class="text-xs font-bold text-white truncate" id="u-name">Gość</div>
                <button id="admin-login-small" class="ml-auto opacity-20 hover:opacity-100" onclick="loginAdmin()"><i data-lucide="key" class="w-3 h-3"></i></button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-12 border-b border-[#1F2124] flex items-center px-4 bg-[#313338] font-bold text-white shadow-sm">
                # <span id="current-ch-name" class="ml-2">ogolny</span>
            </header>

            <!-- Widok: CZAT -->
            <div id="tab-chat" class="tab-content flex-1 flex flex-col overflow-hidden">
                <div id="chat-messages" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
                <div class="p-4"><input type="text" id="chat-input" class="w-full bg-[#383A40] p-3 rounded-lg outline-none text-white text-sm" placeholder="Napisz wiadomość..."></div>
            </div>

            <!-- Widok: ZGŁOSZENIA -->
            <div id="tab-apply" class="tab-content hidden flex-1 p-8 overflow-y-auto">
                <div class="max-w-lg mx-auto bg-[#2B2D31] p-8 rounded-xl border border-[#3F4147]">
                    <h2 class="text-2xl font-bold mb-6">DODAJ SERWER</h2>
                    <input id="srv-name" class="w-full bg-[#1E1F22] p-3 rounded mb-4 outline-none" placeholder="Nazwa Serwera">
                    <input id="srv-code" class="w-full bg-[#1E1F22] p-3 rounded mb-4 outline-none" placeholder="Kod EH (np. 123-456)">
                    <textarea id="srv-desc" class="w-full bg-[#1E1F22] p-3 rounded mb-4 h-32 outline-none" placeholder="Dlaczego Twój serwer?"></textarea>
                    <button onclick="submitServer()" class="w-full bg-[#3BA55C] py-3 rounded font-bold hover:bg-[#2D7D46]">WYŚLIJ DO ADMINA</button>
                </div>
            </div>

            <!-- Widok: ADMIN -->
            <div id="tab-admin" class="tab-content hidden flex-1 p-8 overflow-y-auto bg-[#1E1F22]">
                <h1 class="text-3xl font-bold text-red-500 mb-8 uppercase">Zgłoszenia od Graczy</h1>
                <div id="admin-requests" class="space-y-4"></div>
            </div>
        </main>
    </div>

    <script>
        // --- KONFIGURACJA FIREBASE ---
        // WKLEJ TUTAJ SWÓJ LINK Z KROKU 1:
        const firebaseConfig = {
            databaseURL: "TU_WKLEJ_SWOJ_LINK_Z_FIREBASE" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myNick = "Gość";
        let currentChannel = "ogolny";

        // Funkcja logowania
        function saveNick() {
            const val = document.getElementById('user-nick-input').value.trim();
            if(val.length < 2) return alert("Nick za krótki!");
            myNick = val;
            document.getElementById('u-name').innerText = myNick;
            document.getElementById('u-avatar').innerText = myNick[0].toUpperCase();
            document.getElementById('nick-modal').style.display = 'none';
            listenForMessages();
        }

        // CZAT: Wysyłanie
        document.getElementById('chat-input').onkeypress = (e) => {
            if(e.key === 'Enter') {
                const text = e.target.value.trim();
                if(!text) return;
                db.ref('messages/' + currentChannel).push({
                    nick: myNick,
                    text: text,
                    time: new Date().toLocaleTimeString()
                });
                e.target.value = "";
            }
        };

        // CZAT: Pobieranie (ZAPISUJE SIĘ NA ZAWSZE!)
        function listenForMessages() {
            db.ref('messages/' + currentChannel).on('value', (snap) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = "";
                snap.forEach(child => {
                    const m = child.val();
                    box.innerHTML += `
                        <div class="msg flex gap-3">
                            <div class="w-10 h-10 bg-[#4E5058] rounded-full flex items-center justify-center font-bold">${m.nick[0]}</div>
                            <div>
                                <div class="flex items-center gap-2"><span class="font-bold text-white">${m.nick}</span><span class="text-[10px] text-gray-500">${m.time}</span></div>
                                <p class="text-sm">${m.text}</p>
                            </div>
                        </div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // ZGŁOSZENIA: Wysyłanie
        function submitServer() {
            const name = document.getElementById('srv-name').value;
            const code = document.getElementById('srv-code').value;
            const desc = document.getElementById('srv-desc').value;
            
            db.ref('requests').push({
                sender: myNick,
                serverName: name,
                serverCode: code,
                description: desc,
                status: 'OCZEKUJĄCE'
            }).then(() => {
                alert("Wysłano! Admin sprawdzi to w panelu.");
                showTab('chat');
            });
        }

        // ADMIN: Logowanie i Widok
        function loginAdmin() {
            if(prompt("Kod Admina:") === "EH2026") {
                document.getElementById('admin-icon').classList.remove('hidden');
                alert("Zalogowano jako Admin!");
            }
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if(tab === 'admin') loadRequests();
            lucide.createIcons();
        }

        function loadRequests() {
            db.ref('requests').on('value', snap => {
                const box = document.getElementById('admin-requests');
                box.innerHTML = "";
                snap.forEach(child => {
                    const r = child.val();
                    box.innerHTML += `
                        <div class="bg-[#2B2D31] p-6 rounded-lg border border-red-900/30 shadow-lg">
                            <h3 class="text-xl font-bold text-white">${r.serverName} (Kod: ${r.serverCode})</h3>
                            <p class="text-gray-400 text-sm my-2">${r.description}</p>
                            <div class="text-[10px] text-blue-400">Wysłane przez: ${r.sender}</div>
                            <div class="mt-4 flex gap-2">
                                <button class="bg-green-600 px-4 py-1 rounded text-xs font-bold" onclick="alert('Zaakceptowano!')">AKCEPTUJ</button>
                                <button class="bg-red-600 px-4 py-1 rounded text-xs font-bold" onclick="db.ref('requests/${child.key}').remove()">USUŃ</button>
                            </div>
                        </div>`;
                });
            });
        }

        function changeChannel(ch) {
            currentChannel = ch;
            document.getElementById('current-ch-name').innerText = ch;
            listenForMessages();
        }

        lucide.createIcons();
    </script>
</body>
</html>
