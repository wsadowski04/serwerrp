<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EH Portal - Serwery RP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-[#313338] text-[#DBDEE1]">

    <!-- EKRAN LOGOWANIA / REJESTRACJI -->
    <div id="auth-screen" class="fixed inset-0 bg-[#1E1F22] z-[1000] flex items-center justify-center p-4">
        <div class="bg-[#313338] p-8 rounded-xl shadow-2xl w-full max-w-md border border-[#3F4147]">
            <h1 class="text-2xl font-bold text-white text-center mb-2">EH Portal</h1>
            <p class="text-sm text-[#B5BAC1] text-center mb-6">Zaloguj się lub załóż konto, aby pisać</p>
            
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="Email (np. nick@wp.pl)" class="w-full bg-[#1E1F22] p-3 rounded outline-none ring-1 ring-[#3F4147] focus:ring-[#5865F2]">
                <input type="password" id="auth-pass" placeholder="Hasło" class="w-full bg-[#1E1F22] p-3 rounded outline-none ring-1 ring-[#3F4147] focus:ring-[#5865F2]">
                
                <div class="flex gap-2">
                    <button onclick="handleAuth('login')" class="flex-1 bg-[#5865F2] hover:bg-[#4752C4] py-3 rounded font-bold transition-all">Zaloguj</button>
                    <button onclick="handleAuth('register')" class="flex-1 border border-[#5865F2] text-[#5865F2] hover:bg-[#5865F2] hover:text-white py-3 rounded font-bold transition-all">Zarejestruj</button>
                </div>
            </div>
        </div>
    </div>

    <!-- GŁÓWNA APLIKACJA -->
    <div id="main-app" class="hidden flex h-full">
        <!-- Sidebar -->
        <nav class="w-[72px] bg-[#1E1F22] flex flex-col items-center py-3 space-y-4">
            <div onclick="showTab('chat')" class="w-12 h-12 bg-[#5865F2] rounded-[16px] flex items-center justify-center text-white cursor-pointer hover:rounded-[12px] transition-all"><i data-lucide="message-square"></i></div>
            <div onclick="showTab('apply')" class="w-12 h-12 bg-[#3BA55C] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all"><i data-lucide="plus-circle"></i></div>
            <div id="admin-btn" onclick="showTab('admin')" class="hidden w-12 h-12 bg-[#ED4245] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all"><i data-lucide="shield"></i></div>
            <div onclick="logout()" class="mt-auto w-12 h-12 bg-[#4E5058] rounded-[24px] flex items-center justify-center text-white cursor-pointer hover:rounded-[16px] transition-all"><i data-lucide="log-out"></i></div>
        </nav>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col">
            <header class="h-12 border-b border-[#1F2124] flex items-center px-4 font-bold bg-[#313338] justify-between">
                <div># <span id="header-text" class="ml-2 uppercase text-sm">ogólny</span></div>
                <button onclick="checkAdmin()" class="text-[10px] text-[#4E5058] hover:text-white">Panel Admina</button>
            </header>

            <!-- Widok: Czat -->
            <div id="tab-chat" class="tab-content flex-1 flex flex-col overflow-hidden p-4">
                <div id="chat-box" class="flex-1 overflow-y-auto space-y-3 mb-4 pr-2"></div>
                <div class="bg-[#383A40] rounded-lg p-2 flex">
                    <input type="text" id="chat-in" class="bg-transparent flex-1 p-2 outline-none text-sm" placeholder="Napisz coś...">
                </div>
            </div>

            <!-- Widok: Zgłoszenia -->
            <div id="tab-apply" class="tab-content hidden flex-1 p-8 overflow-y-auto">
                <div class="max-w-lg mx-auto bg-[#2B2D31] p-6 rounded-xl border border-[#3F4147]">
                    <h2 class="text-xl font-bold mb-4">DODAJ SWÓJ SERWER</h2>
                    <input id="s-name" placeholder="Nazwa Serwera" class="w-full bg-[#1E1F22] p-3 mb-3 rounded outline-none border border-transparent focus:border-[#3BA55C]">
                    <input id="s-code" placeholder="Kod EH (np. 111-222)" class="w-full bg-[#1E1F22] p-3 mb-3 rounded outline-none">
                    <textarea id="s-desc" placeholder="Opis/Regulamin..." class="w-full bg-[#1E1F22] p-3 mb-3 rounded h-32 outline-none"></textarea>
                    <button onclick="sendSrv()" class="w-full bg-[#3BA55C] py-3 rounded font-bold uppercase hover:bg-[#2d7d46]">Wyślij do Admina</button>
                </div>
            </div>

            <!-- Widok: Admin (Tylko dla Ciebie) -->
            <div id="tab-admin" class="tab-content hidden flex-1 p-8 overflow-y-auto">
                <h2 class="text-2xl font-bold text-red-500 mb-6">OCZEKUJĄCE ZGŁOSZENIA</h2>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script>
        // TWOJA KONFIGURACJA Z OBRAZ_4.PNG
        const firebaseConfig = {
            apiKey: "AIzaSyAG7tgMkouem-YVmGCPOYO64Fb3zUGWs7w",
            authDomain: "eh-portal-87389.firebaseapp.com",
            databaseURL: "https://eh-portal-87389-default-rtdb.firebaseio.com",
            projectId: "eh-portal-87389",
            storageBucket: "eh-portal-87389.appspot.com",
            messagingSenderId: "393601722792",
            appId: "1:393601722792:web:f5549c97312a2236f0d59d",
            measurementId: "G-RXBY6BKTZ1"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Autoryzacja
        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("Wypełnij pola!");
            try {
                if(type === 'register') {
                    await auth.createUserWithEmailAndPassword(email, pass);
                    alert("Konto założone!");
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) { alert("Błąd: " + e.message); }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadChat();
            } else {
                document.getElementById('auth-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function logout() { auth.signOut(); }

        // Czat
        function loadChat() {
            db.ref('messages').limitToLast(50).on('value', snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    box.innerHTML += `<div class="bg-[#2B2D31] p-3 rounded-md border-l-4 border-[#5865F2]"><span class="font-bold text-[#5865F2] text-xs">${m.user}</span><p class="text-sm">${m.text}</p></div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('chat-in').onkeypress = (e) => {
            if(e.key === 'Enter' && e.target.value.trim()) {
                db.ref('messages').push({ user: auth.currentUser.email.split('@')[0], text: e.target.value });
                e.target.value = "";
            }
        };

        // Serwery
        function sendSrv() {
            const name = document.getElementById('s-name').value;
            if(!name) return alert("Podaj nazwę!");
            db.ref('requests').push({
                user: auth.currentUser.email,
                name: name,
                code: document.getElementById('s-code').value,
                desc: document.getElementById('s-desc').value
            }).then(() => { alert("Zgłoszenie wysłane!"); showTab('chat'); });
        }

        // Admin
        function checkAdmin() {
            const code = prompt("Kod Admina:");
            if(code === "EH2026") {
                document.getElementById('admin-btn').classList.remove('hidden');
                alert("Panel Admina odblokowany w menu po lewej!");
            }
        }

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
            document.getElementById('tab-'+t).classList.remove('hidden');
            if(t === 'admin') loadAdmin();
        }

        function loadAdmin() {
            db.ref('requests').on('value', snap => {
                const box = document.getElementById('admin-list');
                box.innerHTML = "";
                snap.forEach(c => {
                    const r = c.val();
                    box.innerHTML += `<div class="bg-[#2B2D31] p-4 rounded border border-red-900"><h3 class="font-bold">${r.name} (${r.code})</h3><p class="text-xs text-gray-400">${r.desc}</p><button onclick="db.ref('requests/${c.key}').remove()" class="mt-2 text-red-500 text-[10px] font-bold">USUŃ</button></div>`;
                });
            });
        }

        lucide.createIcons();
    </script>
</body>
</html>
